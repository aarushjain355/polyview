plot_y_padding: 0.3
secondary_axis_keys:
- rough_n
- green_wall_point_count
- whiteboard_point_count
- green_wall_dropout_cell_count
- whiteboard_dropout_cell_count
- green_wall_total_cell_count
- whiteboard_total_cell_count
- range_std
split_by_suffix_categories:
- TemporalConsistency
- SurfaceFitResidual
- RangePrecision
split_exclude_suffixes:
  RangePrecision:
  - mean
  TemporalConsistency:
  - mean
thresholdable_metrics:
- RangeDistributionHealth
- LocalRoughnessKNN
- NearestNeighbourSpacing
- RangePrecision
- TemporalConsistency
- ZoneSurfaceDepthError
- SurfaceFitResidual
- RangePrecision
- "SurfaceFitResidual \xB7 offset"
- SpatialDropout
- PointYieldPerZone
